<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>おてがるフラッシュカード</title>
    <style>
        :root {
            --bg-color: #e0f7fa; /* うすい水色 */
            --text-color: #333;
            --accent-color: #007bff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: sans-serif;
            background-color: var(--bg-color);
            overflow: hidden;
            touch-action: manipulation; /* ダブルタップズーム防止 */
        }

        /* 管理画面レイアウト */
        #admin-screen {
            padding: 20px;
            height: 100%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .controls {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .card-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            position: relative;
        }

        .card-item img {
            width: 100%;
            height: 100px;
            object-fit: contain;
        }

        .card-item input {
            width: 100%;
            margin-top: 5px;
        }

        .order-btns {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
        }

        /* 再生画面レイアウト */
        #play-screen {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #card-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 90%;
            height: 90%;
            text-align: center;
        }

        #display-image {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
            margin-bottom: 20px;
        }

        #display-text {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: bold;
            color: var(--text-color);
        }

        /* 設定アイコン */
        #gear-icon {
            position: absolute;
            right: 15px;
            bottom: 15px;
            font-size: 24px;
            opacity: 0.1; /* 目立たないように */
            cursor: pointer;
            z-index: 100;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            background-color: var(--accent-color);
            color: white;
        }

        .delete-btn { background: #dc3545; font-size: 12px; padding: 5px; }
        .move-btn { background: #6c757d; font-size: 12px; padding: 5px; }

    </style>
</head>
<body>

<div id="admin-screen">
    <h1>フラッシュカード管理</h1>
    
    <div class="controls">
        <input type="file" id="file-input" multiple accept="image/*">
        <p>設定：
            表示順：<select id="order-mode"><option value="normal">順番通り</option><option value="shuffle">ランダム</option></select>
            再生：<select id="auto-mode">
                <option value="0">手動</option>
                <option value="1000">自動（1秒）</option>
                <option value="5000">自動（5秒）</option>
                <option value="10000">自動（10秒）</option>
            </select>
            <button onclick="startApp()">再生開始</button>
        </p>
    </div>

    <div id="card-list" class="card-list"></div>
</div>

<div id="play-screen" style="display:none;">
    <div id="card-content" onclick="nextCard()">
        <img id="display-image" src="" alt="" style="display:none;">
        <div id="display-text"></div>
    </div>
    <div id="gear-icon" onclick="stopApp()">⚙️</div>
</div>

<script>
    let cards = [];
    let currentIndex = 0;
    let timer = null;
    let db;

    // IndexedDB 初期化
    const request = indexedDB.open("FlashcardDB", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("cards", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => {
        db = e.target.result;
        loadCards();
    };

    // ファイル読み込み
    document.getElementById('file-input').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        for (const file of files) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const card = { image: event.target.result, text: "" };
                const transaction = db.transaction(["cards"], "readwrite");
                transaction.objectStore("cards").add(card);
                loadCards();
            };
            reader.readAsDataURL(file);
        }
    });

    // カード読み込み・描画
    function loadCards() {
        const transaction = db.transaction(["cards"], "readonly");
        const store = transaction.objectStore("cards");
        const getAll = store.getAll();
        getAll.onsuccess = () => {
            cards = getAll.result;
            renderAdmin();
        };
    }

    function renderAdmin() {
        const list = document.getElementById('card-list');
        list.innerHTML = "";
        cards.forEach((card, index) => {
            const div = document.createElement('div');
            div.className = "card-item";
            div.innerHTML = `
                <img src="${card.image}">
                <input type="text" value="${card.text}" onchange="updateText(${card.id}, this.value)" placeholder="テキストなし">
                <div class="order-btns">
                    <button class="move-btn" onclick="moveCard(${index}, -1)">←</button>
                    <button class="delete-btn" onclick="deleteCard(${card.id})">削除</button>
                    <button class="move-btn" onclick="moveCard(${index}, 1)">→</button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function updateText(id, text) {
        const transaction = db.transaction(["cards"], "readwrite");
        const store = transaction.objectStore("cards");
        store.get(id).onsuccess = (e) => {
            const data = e.target.result;
            data.text = text;
            store.put(data);
        };
    }

    function deleteCard(id) {
        const transaction = db.transaction(["cards"], "readwrite");
        transaction.objectStore("cards").delete(id).onsuccess = loadCards;
    }

    function moveCard(index, direction) {
        const targetIndex = index + direction;
        if (targetIndex < 0 || targetIndex >= cards.length) return;
        const temp = cards[index];
        cards.splice(index, 1);
        cards.splice(targetIndex, 0, temp);
        
        // IndexedDBの全データを一旦クリアして再保存（簡易的な順番保持のため）
        const transaction = db.transaction(["cards"], "readwrite");
        const store = transaction.objectStore("cards");
        store.clear().onsuccess = () => {
            cards.forEach(c => {
                delete c.id;
                store.add(c);
            });
            loadCards();
        };
    }

    // アプリ開始
    let playList = [];
    function startApp() {
        if (cards.length === 0) return alert("カードを読み込んでください");
        
        playList = [...cards];
        if (document.getElementById('order-mode').value === 'shuffle') {
            playList.sort(() => Math.random() - 0.5);
        }

        currentIndex = 0;
        document.getElementById('admin-screen').style.display = 'none';
        document.getElementById('play-screen').style.display = 'flex';
        showCard();

        const interval = parseInt(document.getElementById('auto-mode').value);
        if (interval > 0) {
            timer = setInterval(nextCard, interval);
        }
    }

    function stopApp() {
        clearInterval(timer);
        document.getElementById('admin-screen').style.display = 'block';
        document.getElementById('play-screen').style.display = 'none';
    }

    function showCard() {
        const card = playList[currentIndex];
        const imgEl = document.getElementById('display-image');
        const textEl = document.getElementById('display-text');

        if (card.image) {
            imgEl.src = card.image;
            imgEl.style.display = 'block';
        } else {
            imgEl.style.display = 'none';
        }
        textEl.textContent = card.text || "";
    }

    function nextCard() {
        currentIndex = (currentIndex + 1) % playList.length;
        showCard();
    }

    function prevCard() {
        currentIndex = (currentIndex - 1 + playList.length) % playList.length;
        showCard();
    }

    // スワイプ判定
    let touchStartX = 0;
    document.getElementById('play-screen').addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    });
    document.getElementById('play-screen').addEventListener('touchend', e => {
        let touchEndX = e.changedTouches[0].screenX;
        if (touchStartX - touchEndX > 50) nextCard();
        if (touchEndX - touchStartX > 50) prevCard();
    });
</script>
</body>
</html>
